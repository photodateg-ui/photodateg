name: OTA Update (EAS Update)

on:
  workflow_dispatch:
    inputs:
      message:
        description: '更新内容のメモ'
        required: false
        default: 'JS update'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: eas update --channel production --message "${{ github.event.inputs.message }}" --non-interactive
